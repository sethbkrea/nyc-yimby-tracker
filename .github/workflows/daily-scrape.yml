name: Daily YIMBY scrape

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser==6.0.11 beautifulsoup4==4.12.3 lxml==5.3.0 python-dateutil==2.9.0.post0

      - name: Run scraper
        env:
          YIMBY_FEED_URL: ${{ secrets.YIMBY_FEED_URL }}
          MAX_AGE_DAYS: ${{ vars.MAX_AGE_DAYS || '30' }}
        run: python scrape.py

      - name: Commit updated articles.json
        run: |
          if git diff --quiet articles.json; then
            echo "No changes to articles.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git commit -m "chore: daily scrape [skip ci]"
          git push
