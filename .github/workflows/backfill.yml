name: Historical backfill

on:
  workflow_dispatch:
    inputs:
      start_month:
        description: "Start month (YYYY-MM, inclusive)"
        required: true
        default: "2025-08"
      end_month:
        description: "End month (YYYY-MM, inclusive). Blank = current month."
        required: false
        default: ""
      dry_run:
        description: "Dry run (collect URLs, don't write)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run backfill
        run: |
          ARGS="--start ${{ inputs.start_month }}"
          if [ -n "${{ inputs.end_month }}" ]; then
            ARGS="$ARGS --end ${{ inputs.end_month }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python backfill.py $ARGS

      - name: Commit updated articles.json
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet articles.json; then
            echo "No changes to articles.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git commit -m "chore: backfill ${{ inputs.start_month }}..${{ inputs.end_month || 'now' }} [skip ci]"
          git push
